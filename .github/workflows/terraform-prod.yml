name: deployProd

on:
    push: 
        branches:
            - main
    pull_request: 
        branches: 
            - main        
env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_resource_group_name: ${{ vars.TF_VAR_resource_group_name }}
  TF_VAR_environment: ${{ vars.TF_VAR_environment }}
  TF_VAR_location: ${{ vars.TF_VAR_location }}
  TF_VAR_vnet_name: ${{ vars.TF_VAR_vnet_name }}
  TF_VAR_vnet_address_space: ${{ vars.TF_VAR_vnet_address_space }}
  TF_VAR_subnet_name: ${{ vars.TF_VAR_subnet_name }}
  TF_VAR_subnet_address_prefix: ${{ vars.TF_VAR_subnet_address_prefix }}
  TF_VAR_storage_account_name: ${{ vars.TF_VAR_storage_account_name }}
  TF_VAR_vm_name: ${{ vars.TF_VAR_vm_name }}
  TF_VAR_vm_size: ${{ vars.TF_VAR_vm_size }}
  TF_VAR_admin_username: ${{ vars.TF_VAR_admin_username }}

  


    
jobs:
  terraform-prod:
    name: Terraform PROD
    runs-on: ubuntu-latest
    environment: produccion
    
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
